<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatBot Sheets Pro - Fixed</title>
  <style>
    /* CSS sama seperti sebelumnya, tidak berubah */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .chat-container {
      width: 100%;
      max-width: 420px;
      height: 90vh;
      min-height: 500px;
      background: rgba(255,255,255,0.98);
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .bot-avatar {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .header-info { flex: 1; }
    .header-title { font-weight: 700; font-size: 16px; }
    .header-subtitle { font-size: 12px; opacity: 0.9; display: flex; align-items: center; gap: 6px; }
    .status-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .save-status {
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 20px;
      background: rgba(255,255,255,0.15);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .save-status:hover { background: rgba(255,255,255,0.25); }
    .save-status.saving { background: rgba(251,191,36,0.3); }
    .save-status.saved { background: rgba(74,222,128,0.3); }
    .save-status.error { background: rgba(248,113,113,0.3); }
    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .user-message {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      margin-left: auto;
    }
    .bot-message {
      background: #fff;
      color: #1f2937;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid #e5e7eb;
    }
    .message-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      font-size: 11px;
      opacity: 0.6;
    }
    .user-message .message-meta { justify-content: flex-end; }
    .save-indicator {
      width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      font-size: 10px;
    }
    .save-indicator.pending { background: #fbbf24; color: #fff; }
    .save-indicator.saved { background: #4ade80; color: #fff; }
    .save-indicator.error { background: #f87171; color: #fff; }
    .save-indicator.skipped { background: #9ca3af; color: #fff; }
    .typing-indicator {
      display: none;
      align-self: flex-start;
      background: #fff;
      padding: 16px 20px;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      margin-left: 12px;
    }
    .typing-indicator.active { display: flex; gap: 6px; }
    .typing-dot {
      width: 8px; height: 8px;
      background: #667eea;
      border-radius: 50%;
      animation: typingBounce 1.4s infinite ease-in-out both;
    }
    @keyframes typingBounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }
    .quick-replies {
      display: flex; gap: 8px;
      padding: 12px 16px;
      flex-wrap: wrap;
      background: #f1f5f9;
      border-top: 1px solid #e2e8f0;
    }
    .chip {
      padding: 8px 14px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .chip:hover { 
      background: #667eea; 
      color: #fff; 
      border-color: #667eea;
    }
    .chat-input {
      display: flex; align-items: center;
      padding: 16px;
      background: #fff;
      border-top: 1px solid #e2e8f0;
      gap: 12px;
    }
    .chat-input input {
      flex: 1;
      padding: 14px 18px;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      outline: none; font-size: 14px;
    }
    .chat-input input:focus { 
      border-color: #667eea; 
      box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }
    .send-btn {
      width: 44px; height: 44px;
      border: none; border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .welcome-card {
      background: linear-gradient(135deg, rgba(102,126,234,0.08) 0%, rgba(118,75,162,0.04) 100%);
      border: 1px solid rgba(102,126,234,0.15);
      padding: 16px;
      border-radius: 12px;
    }
    .welcome-title { 
      font-weight: 700; 
      color: #667eea; 
      margin-bottom: 8px; 
      font-size: 16px;
    }
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .menu-item {
      padding: 10px 12px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      font-size: 12px;
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
    }
    .menu-item:hover {
      border-color: #667eea;
      background: rgba(102,126,234,0.05);
    }
    .menu-number {
      width: 20px; height: 20px;
      background: #667eea;
      color: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
    }
    .toast {
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1f2937;
      color: #fff;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { background: #10b981; }
    .toast.error { background: #ef4444; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="bot-avatar">🤖</div>
      <div class="header-info">
        <div class="header-title">Klim's Assistant Pro</div>
        <div class="header-subtitle">
          <span class="status-dot"></span>
          <span id="statusText">Online • Siap membantu</span>
        </div>
      </div>
      <div class="save-status" id="saveStatus" onclick="testConnection()">
        <span id="saveIcon">💾</span>
        <span id="saveText">History</span>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>

    <div class="quick-replies">
      <span class="chip" onclick="sendQuick('1')">1</span>
      <span class="chip" onclick="sendQuick('2')">2</span>
      <span class="chip" onclick="sendQuick('3')">3</span>
      <span class="chip" onclick="sendQuick('4')">4</span>
      <span class="chip" onclick="sendQuick('5')">5</span>
      <span class="chip" onclick="sendQuick('20')">Menu</span>
    </div>

    <div class="chat-input">
      <input id="userInput" type="text" placeholder="Ketik pesan atau pilih menu..." autocomplete="off"/>
      <button class="send-btn" onclick="sendMessage()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // ⚙️ KONFIGURASI - UPDATE URL WEB APP ANDA DI SINI!
    // ═══════════════════════════════════════════════════════════════
    const CONFIG = {
      // 🔴 PENTING: Ganti dengan URL Web App GAS yang sudah di-deploy!
      // Format: https://script.google.com/macros/s/SCRIPT_ID/exec
      APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbyvIOlQYKLE1RN2pMxebPfHZ6-HrvUqmWAsssy1HOyMJNm1IYijZ1vYEto-X0M8S8Xt/exec',
      
      DEBUG: true
    };

    // State management
    const state = {
      sessionId: generateSessionId(),
      saveQueue: Promise.resolve()
    };

    function generateSessionId() {
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      return `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}-${Math.random().toString(36).substr(2, 5).toUpperCase()}`;
    }

    function log(...args) {
      if (CONFIG.DEBUG) console.log('[ChatBot]', ...args);
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function updateSaveStatus(status, text) {
      const badge = document.getElementById('saveStatus');
      const icon = document.getElementById('saveIcon');
      const label = document.getElementById('saveText');
      
      badge.className = 'save-status ' + status;
      
      const states = {
        saving: { icon: '⏳', text: text || 'Menyimpan...' },
        saved: { icon: '✅', text: text || 'Tersimpan' },
        error: { icon: '⚠️', text: text || 'Gagal' },
        config: { icon: '🔧', text: text || 'Setup' }
      };
      
      const s = states[status] || states.config;
      icon.textContent = s.icon;
      label.textContent = s.text;
      
      if (status === 'saved') setTimeout(() => updateSaveStatus(''), 3000);
    }

    // ═══════════════════════════════════════════════════════════════
    // 🔥 FUNGSI UTAMA: Simpan chat ke Spreadsheet (FIXED VERSION)
    // ═══════════════════════════════════════════════════════════════
    
    function isConfigured() {
      return CONFIG.APPS_SCRIPT_URL && 
             !CONFIG.APPS_SCRIPT_URL.includes('YOUR_') &&
             CONFIG.APPS_SCRIPT_URL.startsWith('https://script.google.com/macros/s/');
    }

    async function saveToSheet(sender, message, retryCount = 0) {
      if (!isConfigured()) {
        log('⚠️ APPS_SCRIPT_URL belum dikonfigurasi');
        return { skipped: true, reason: 'not_configured' };
      }

      const payload = {
        sessionId: state.sessionId,
        sender: sender,
        message: message,
        userAgent: navigator.userAgent,
        timestamp: new Date().toISOString()
      };

      log('💾 Saving:', payload);

      // 🔴 SOLUSI KUNCI: Gunakan mode 'no-cors' sebagai fallback
      // atau gunakan text/plain dengan redirect: 'follow'
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 detik timeout

        const response = await fetch(CONFIG.APPS_SCRIPT_URL, {
          method: 'POST',
          redirect: 'follow',
          signal: controller.signal,
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify(payload)
        });

        clearTimeout(timeoutId);
        log('📡 Response status:', response.status);

        // Cek jika response ok
        if (!response.ok && response.status !== 200) {
          throw new Error(`HTTP ${response.status}`);
        }

        // Parse JSON response
        const text = await response.text();
        log('📄 Raw response:', text);
        
        let result;
        try {
          result = JSON.parse(text);
        } catch (e) {
          // Kadang GAS return HTML redirect page, cek jika contains success
          if (text.includes('success') || text.includes('ok')) {
            result = { status: 'success' };
          } else {
            throw new Error('Invalid JSON response');
          }
        }

        log('✅ Save result:', result);

        if (result.status === 'success') {
          return { success: true, data: result.data };
        } else {
          throw new Error(result.message || 'Server error');
        }

      } catch (err) {
        log('❌ Save error:', err);
        
        // Retry logic (max 2 retries)
        if (retryCount < 2) {
          updateSaveStatus('saving', `Retry ${retryCount + 1}...`);
          await new Promise(r => setTimeout(r, 1000 * (retryCount + 1)));
          return saveToSheet(sender, message, retryCount + 1);
        }
        
        // Jika masih gagal, coba dengan mode no-cors (opaque response)
        if (retryCount === 2) {
          log('🔄 Trying no-cors mode...');
          try {
            await fetch(CONFIG.APPS_SCRIPT_URL, {
              method: 'POST',
              mode: 'no-cors',
              headers: { 'Content-Type': 'text/plain' },
              body: JSON.stringify(payload)
            });
            // no-cors tidak bisa membaca response, tapi request tetap terkirim
            return { success: true, data: { mode: 'no-cors' } };
          } catch (noCorsErr) {
            log('❌ no-cors also failed:', noCorsErr);
          }
        }
        
        return { success: false, error: err.message };
      }
    }

    // Test koneksi ke GAS
    async function testConnection() {
      if (!isConfigured()) {
        showToast('⚠️ URL Web App belum dikonfigurasi!', 'error');
        updateSaveStatus('config');
        return false;
      }
      
      updateSaveStatus('saving', 'Testing...');
      
      try {
        const url = CONFIG.APPS_SCRIPT_URL + '?action=test';
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);

        const response = await fetch(url, { signal: controller.signal });
        clearTimeout(timeoutId);
        
        const text = await response.text();
        log('Test response:', text);
        
        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          data = { status: 'error', message: 'Invalid response' };
        }
        
        if (data.status === 'ok') {
          showToast(`✅ Terhubung! Spreadsheet: ${data.spreadsheet?.name || 'OK'}`);
          updateSaveStatus('saved', 'Connected');
          return true;
        } else {
          throw new Error(data.message);
        }
      } catch (err) {
        log('Test connection error:', err);
        showToast('❌ Koneksi gagal: ' + err.message, 'error');
        updateSaveStatus('error');
        return false;
      }
    }

    // ═══════════════════════════════════════════════════════════════
    // CHAT FUNCTIONS
    // ═══════════════════════════════════════════════════════════════
    
    // Data lokal untuk chatbot (fallback jika sheet tidak tersedia)
    const localData = {
      '1': 'Informasi PTM Komisaris: PTM Komisaris adalah...',
      '2': 'Informasi PTM Direksi: PTM Direksi adalah...',
      '20': 'Menu Utama:\n1. PTM Komisaris\n2. PTM Direksi\n3. PTM Eksekutif\n4. PTM Supervisor\n5. PTM Pelaksana\n6. PJJ Dir-Kom\n7. PJJ Eksekutif\n8. Apex BPR\n9. Pos Indo\n10. Advokat\n11. Cek Sertifikat'
    };

    function findAnswer(input) {
      const q = input.trim();
      return localData[q] || `Maaf, kode <strong>${escapeHtml(q)}</strong> tidak ditemukan.<br>Ketik <strong>20</strong> untuk melihat menu utama.`;
    }

    function renderMessage(text, isUser) {
      if (isUser) {
        return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }
      return text; // Bot message support HTML
    }

    function addMessage(text, sender) {
      const container = document.getElementById('chatMessages');
      const isUser = sender === 'user';
      
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
      
      const time = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
      const content = renderMessage(text, isUser);
      
      const indicatorId = 'ind-' + Date.now();
      
      msgDiv.innerHTML = `
        <div>${content}</div>
        <div class="message-meta">
          ${time}
          <span class="save-indicator pending" id="${indicatorId}">○</span>
        </div>
      `;
      
      container.appendChild(msgDiv);
      container.scrollTop = container.scrollHeight;
      
      // Save to spreadsheet dengan queue
      updateSaveStatus('saving');
      saveToSheet(sender, text).then(result => {
        const ind = document.getElementById(indicatorId);
        if (!ind) return;
        
        if (result.success) {
          ind.className = 'save-indicator saved';
          ind.textContent = '✓';
          ind.title = `Tersimpan${result.data?.rowNumber ? ' (Row ' + result.data.rowNumber + ')' : ''}`;
          updateSaveStatus('saved');
        } else if (result.skipped) {
          ind.className = 'save-indicator skipped';
          ind.textContent = '⊘';
          ind.title = 'History nonaktif';
          updateSaveStatus('');
        } else {
          ind.className = 'save-indicator error';
          ind.textContent = '✗';
          ind.title = 'Gagal: ' + result.error;
          updateSaveStatus('error');
        }
      });
    }

    function showTyping() {
      document.getElementById('typingIndicator').classList.add('active');
    }

    function hideTyping() {
      document.getElementById('typingIndicator').classList.remove('active');
    }

    async function processQuery(query) {
      addMessage(query, 'user');
      showTyping();

      const answer = findAnswer(query);
      
      setTimeout(() => {
        hideTyping();
        addMessage(answer, 'bot');
      }, 600);
    }

    function escapeHtml(text) {
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      processQuery(text);
    }

    function sendQuick(code) {
      processQuery(code);
    }

    // Event listeners
    document.getElementById('userInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });

    // Initialization
    window.addEventListener('DOMContentLoaded', async () => {
      log('🚀 ChatBot initialized. Session:', state.sessionId);
      
      // Tampilkan welcome message
      const container = document.getElementById('chatMessages');
      container.innerHTML = `
        <div class="message bot-message welcome-card">
          <div class="welcome-title">👋 Selamat Datang!</div>
          <div style="color: #64748b; font-size: 13px; line-height: 1.5; margin-bottom: 12px;">
            Saya asisten virtual yang siap membantu. Pilih menu di bawah atau ketik nomor yang diinginkan.
          </div>
          <div class="menu-grid">
            <div class="menu-item" onclick="sendQuick('1')"><span class="menu-number">1</span>PTM Komisaris</div>
            <div class="menu-item" onclick="sendQuick('2')"><span class="menu-number">2</span>PTM Direksi</div>
            <div class="menu-item" onclick="sendQuick('20')"><span class="menu-number">20</span>Menu Utama</div>
          </div>
          <div class="message-meta">${new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})}</div>
        </div>
      `;
      
      // Check configuration
      if (!isConfigured()) {
        updateSaveStatus('config');
        showToast('⚠️ Klik icon 💾 untuk setup spreadsheet', 'error');
      } else {
        // Auto-test connection setelah 1 detik
        setTimeout(testConnection, 1000);
      }
    });
  </script>
</body>
</html>
